<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>

    // 객체 리터럴 표기법 (중괄호 {})
    {
      const person = {
        name: "홍길동",
        age: 30         // 후행 쉼표
      }
    }

    // 속성 (프로퍼티: Property) 
    {
      const car = {
        model: 'Genesis', // key: value => Property
        price: 5000,
        'car-maker': 'Hyundai',
        year: 2026,
        owner: {
          name: '홍길동',

        }
      }

      // Property Value 가져오기
      // 1. Dot (.): 일반적인 상황
      console.log(car.model);
      console.log(car.price);

      // 2. Bracket ([]): 특수한 상황 (Key에 공백 or 하이픈 포함, Key가 변수에 저장된 경우(많음))
      console.log(car['model']);
      console.log(car['price']);
      console.log(car['car-maker']);
      const key = 'year';
      console.log(car[key]);      // Key가 변수에 저장된 경우
    

      // 3. Optinal Chaining (?.)
      // 평가 대상이 없으면? 원래는 오류가 발생하지만, 오류 대신 undefined를 반환하는 방법
      console.log(car.owner.name);
      console.log(car && car.member && car.member.name); // Optinal Chaining가 없으면 과거에 이렇게 사용함
      console.log(car?.member?.name);

      // Property 다루기
      // 없는 Key에 값을 할당하면: 새로 생성
      // 있는 Key에 값을 할당하면: 기존 값 수정
      const book = {} // 빈 객체
      book.title = '홍길동전';  // title Property 생성
      book.title = '소나기';    // title Property 변경
      console.log(book);
      
    }

    // Property Shorthand
    {
      const zipCode = '12345';
      const street = '강남대로';
      
      // key, value 같은 경우 한 번만 작성
      const address = {
        zipCode,  // zipCode: zipCode,
        street,   // street: street,
      }

      console.log(address);

    }

    // 객체 구조 분해 할당 (Object Destructing Assignment)
    {
      const qna = {
        q: '한국의 수도는?',
        a: '서울',
      }

      // 원래는 
      // const question = qna.q;
      // const answer = qna.a;

      // 구조 분해 할당
      const {q, a} = qna; // 기존 이름 그대로 할당 (추천) // key와 같은 이름을 사용하는 것이 기본 
      console.log(q, a);  

      const {q: question, a: answer} = qna; // 새 이름으로 할당 // key 이름 변경
      console.log(question, answer);

      // 간단한 연습 (객체를 함수로 전달할 때)
      function fnPrintUser({id, pw}) {
        console.log(id, pw);
      }

      const user = {
        id: 'admin',
        pw: '1234',
      }

      fnPrintUser(user);

      // 나머지 속성 (Rest Property)
      // 말 줄임표(...) 사용
      const computer = {
        cpu: 'm4',
        ram: '8g',
        ssd: '128g',
      }

      // 구조 분해 할당 시 나머지 속성 사용
      const { cpu, ...rest } = computer;
      console.log(cpu);   // 'm4'
      console.log(rest);  // {ram: '8g', ssd: '128g'}

    }

    // 전개 구문 (Spread)
    {
      const phone = {
        model: 'galaxy',
        size: '5 inch',
      }

      const smartPhone = {
        ...phone,   // phone 객체의 프로퍼티를 펼쳐라
        size: '6 inch',   // 수정
      }

      console.log(smartPhone);

    }

    // this
    // 어떤 함수를 호출하는 주체
    {
      // 일반 함수의 this 바인딩 
      function print() {  
        console.log('print 호출:', this);
      }
      print();  // 호출하는 건: 전역 객체 (window)  // 

      // 메서드(객체가 가진 함수)의 this 바인딩
      const car = {
        model: 'Ray',
        drive: function () {  // 해당 키가 함수 호출. 할당 같은 방식.
          console.log('drive:', this);
          console.log(this.model + '타고 드라이브!');
        }
      }

      car.drive();  // 호출하는 건: car 객체

    }

    // 객체 생성자 함수: 동일 프로퍼티를 가진 여러 객체가 필요할 때 유용함
    {
      // 생성자 함수는 PascalCase 권장
      function Office(location) {
        // this 바인딩: 생성자 함수로 생성하는 객체에 연결됨
        this.location = location;
      }

      // 객체 생성: new 연산자로 생성
      const office1 = new Office('101호');
      const office2 = new Office('201호');
      console.log(office1);            
      console.log(office2 instanceof Office);   // true            
    }

    // 프로토타입
    // 모든 객체가 가지는 부모 타입의 객체를 의미함 (자바로 따지면 Object)
    // 프로토타입에는 공유 데이터를 넣고 사용함
    {
      // 개념
      const member = {
        name: 'Kim',
        age: 30,
      }

      console.log(member);
      console.log(member.toString()); // 프로토타입 객체가 지원

      // 프로토타입이 필요한 경우
      function Coffee(store) {  // 생성자 함수
        this.store = store;   // 객체마다 다르기 때문에 있는 게 맞음.
        // 객체 안에 메서드(함수) 만들기
        // this.info = function() {  // 이 구성은 객체마다 동일한 메서드를 가지므로, 메모리 낭비
        //   console.log(`${this.store}에서 파는 커피`);
        // }
      }

      // Coffee 생성자 함수의 메서드를 프로토타입에 등록 (공유 영역에 등록)
      Coffee.prototype.info = function (store) {
        console.log(`${this.store}에서 파는 커피`);
      }

      const coffee1 = new Coffee('메가');
      const coffee2 = new Coffee('컴포즈');
      console.log(coffee1);
      coffee1.info();
      coffee2.info();
      
    }


  </script>
</body>
</html>
