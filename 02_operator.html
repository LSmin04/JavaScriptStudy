<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    // 일치, 불일치
    {
      console.log(10 === '10'); // false
      console.log(10 !== '10'); // true

    }

    // Falsy: false로 취급하는 값(값이 없는 경우)
    {
      
      console.log(0 == false);
      console.log(undefined == false);
      console.log('' == false);
      
    }

    // 논리 연산 (&&, ||)
    // short Circuit .. a > 10 || b > 10 , ||는 앞에가 true면 뒤는 판단 안함 // && 앞에가 false면 뒤 판단X
    {
      let a = 'nice';
      console.log(a || 'hello');  // a에 값이 있으면 사용, 없으면 ‘hello’ 사용
    }

    // 널 병합
    {
      let a;  // undefined
      let b = null; // null
      console.log(typeof a, typeof b);
      console.log(a ?? 'hello');  // a가 nullish하면 'hello' 사용
      console.log(b ?? 'world');  // b가 nullish하면 'world'
    }



  </script>
</body>
</html>
